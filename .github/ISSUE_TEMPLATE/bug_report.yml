name: Bug Report
description: Report a bug in Nexus-Hive
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Start the server with `uvicorn main:app --port 8000`
        2. POST to `/api/ask` with body `{"question": "..."}`
        3. Observe the error in the response
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages, stack traces, or log output.
    validations:
      required: true

  - type: dropdown
    id: adapter
    attributes:
      label: Warehouse Adapter
      description: Which warehouse adapter were you using?
      options:
        - SQLite (default)
        - Snowflake
        - Databricks
        - Not applicable
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Output of `python3 --version`
      placeholder: "3.11.8"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 14.4 / Ubuntu 22.04 / Windows 11"

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or log output.
