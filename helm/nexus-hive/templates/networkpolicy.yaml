{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nexus-hive.fullname" . }}
  labels:
    {{- include "nexus-hive.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nexus-hive.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    {{- if .Values.networkPolicy.egressTo }}
    {{- toYaml .Values.networkPolicy.egressTo | nindent 4 }}
    {{- else }}
    - {}
    {{- end }}
{{- end }}
