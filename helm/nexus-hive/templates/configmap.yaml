apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nexus-hive.configmapName" . }}
  labels:
    {{- include "nexus-hive.labels" . | nindent 4 }}
data:
  {{- range $k, $v := .Values.config }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- if .Values.otelSidecar.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nexus-hive.fullname" . }}-otel
  labels:
    {{- include "nexus-hive.labels" . | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
        timeout: 5s
        send_batch_size: 512
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 64
    exporters:
      otlphttp:
        endpoint: http://otel-collector.observability.svc.cluster.local:4318
      prometheus:
        endpoint: 0.0.0.0:9464
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheus, otlphttp]
{{- end }}
