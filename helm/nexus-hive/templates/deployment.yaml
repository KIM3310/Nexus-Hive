apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexus-hive.fullname" . }}
  labels:
    {{- include "nexus-hive.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  revisionHistoryLimit: 5
  strategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "nexus-hive.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "nexus-hive.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "nexus-hive.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "nexus-hive.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- range .Values.envFromSecrets }}
            - name: {{ .name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .secretName }}
                  key: {{ .key }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "nexus-hive.configmapName" . }}
          livenessProbe:
            {{- toYaml .Values.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.probes.readiness | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.probes.startup | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /home/app/.cache
            {{- if .Values.persistence.enabled }}
            - name: audit
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
        {{- if .Values.ollama.enabled }}
        - name: ollama
          image: {{ include "nexus-hive.ollamaImage" . }}
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          ports:
            - name: ollama
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_MODELS
              value: /root/.ollama/models
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: ollama
            initialDelaySeconds: 20
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: ollama
            initialDelaySeconds: 60
            periodSeconds: 30
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
        {{- end }}
        {{- if .Values.otelSidecar.enabled }}
        - name: otel
          image: "{{ .Values.otelSidecar.image.repository }}:{{ .Values.otelSidecar.image.tag }}"
          args:
            - "--config=/etc/otel/config.yaml"
          resources:
            {{- toYaml .Values.otelSidecar.resources | nindent 12 }}
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel
        {{- end }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
        - name: cache
          emptyDir:
            sizeLimit: 128Mi
        {{- if .Values.persistence.enabled }}
        - name: audit
          persistentVolumeClaim:
            claimName: {{ include "nexus-hive.fullname" . }}-audit
        {{- end }}
        {{- if .Values.ollama.enabled }}
        - name: ollama-models
          {{- if .Values.ollama.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "nexus-hive.ollamaPvcName" . }}
          {{- else }}
          emptyDir:
            sizeLimit: 20Gi
          {{- end }}
        {{- end }}
        {{- if .Values.otelSidecar.enabled }}
        - name: otel-config
          configMap:
            name: {{ include "nexus-hive.fullname" . }}-otel
        {{- end }}
