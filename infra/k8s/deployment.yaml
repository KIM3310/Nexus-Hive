apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-hive
  namespace: nexus-hive
  labels:
    app.kubernetes.io/name: nexus-hive
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nexus-hive
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexus-hive
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: nexus-hive
          image: nexus-hive:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nexus-hive-config
            - secretRef:
                name: nexus-hive-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: runtime-data
              mountPath: /app/.runtime
      volumes:
        - name: runtime-data
          emptyDir: {}
