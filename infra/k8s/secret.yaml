apiVersion: v1
kind: Secret
metadata:
  name: nexus-hive-secrets
  namespace: nexus-hive
  labels:
    app.kubernetes.io/name: nexus-hive
type: Opaque
stringData:
  # Operator authentication
  NEXUS_HIVE_OPERATOR_TOKEN: "changeme"
  # Snowflake credentials (optional)
  # SNOWFLAKE_ACCOUNT: ""
  # SNOWFLAKE_USER: ""
  # SNOWFLAKE_PASSWORD: ""
  # Databricks credentials (optional)
  # DATABRICKS_HOST: ""
  # DATABRICKS_TOKEN: ""
