apiVersion: v1
kind: Secret
metadata:
  name: nexus-hive-secrets
  namespace: nexus-hive
  labels:
    app.kubernetes.io/name: nexus-hive
type: Opaque
stringData:
  # Operator authentication
  NEXUS_HIVE_OPERATOR_TOKEN: ""  # REQUIRED: set a strong token before applying
  # Snowflake credentials (optional)
  # SNOWFLAKE_ACCOUNT: ""
  # SNOWFLAKE_USER: ""
  # SNOWFLAKE_PASSWORD: ""
  # Databricks credentials (optional)
  # DATABRICKS_HOST: ""
  # DATABRICKS_AUTH_TYPE: "databricks-cli"
  # DATABRICKS_CONFIG_PROFILE: "portfolio-databricks"
  # DATABRICKS_CLIENT_ID: ""
  # DATABRICKS_CLIENT_SECRET: ""
  # DATABRICKS_TOKEN: ""
  # DATABRICKS_WAREHOUSE_ID: ""
  # DATABRICKS_CATALOG: "workspace"
  # DATABRICKS_SCHEMA: "nexus_hive"
