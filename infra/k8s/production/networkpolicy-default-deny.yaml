apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: analytics
  labels:
    app.kubernetes.io/name: nexus-hive
    app.kubernetes.io/part-of: nexus-hive
  annotations:
    nexus-hive.io/policy-tier: "baseline"
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  # No ingress rules = default deny ingress.
  # No egress rules = default deny egress.
---
# Allow intra-namespace pod-to-pod DNS so CoreDNS lookups continue to work.
# Without this the default-deny above would block kube-dns.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: analytics
  labels:
    app.kubernetes.io/name: nexus-hive
    app.kubernetes.io/part-of: nexus-hive
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
