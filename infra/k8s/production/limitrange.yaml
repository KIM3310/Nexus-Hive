apiVersion: v1
kind: LimitRange
metadata:
  name: nexus-hive-limits
  namespace: analytics
  labels:
    app.kubernetes.io/name: nexus-hive
    app.kubernetes.io/part-of: nexus-hive
spec:
  limits:
    # Per-container defaults: if a pod does not set requests/limits, these apply.
    - type: Container
      default:
        cpu: "1"
        memory: 1Gi
      defaultRequest:
        cpu: 250m
        memory: 512Mi
      min:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "4"
        memory: 8Gi

    # Per-pod total caps. Nexus-Hive pods are single-container + optional sidecars.
    - type: Pod
      max:
        cpu: "6"
        memory: 12Gi
      min:
        cpu: 100m
        memory: 128Mi

    # PVC size floor/ceiling. Ollama weights are the biggest claim at ~40Gi.
    - type: PersistentVolumeClaim
      min:
        storage: 1Gi
      max:
        storage: 50Gi
