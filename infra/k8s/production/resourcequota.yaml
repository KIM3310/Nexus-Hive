apiVersion: v1
kind: ResourceQuota
metadata:
  name: nexus-hive-quota
  namespace: analytics
  labels:
    app.kubernetes.io/name: nexus-hive
    app.kubernetes.io/part-of: nexus-hive
spec:
  hard:
    # Compute
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi

    # Ephemeral storage
    requests.ephemeral-storage: 10Gi
    limits.ephemeral-storage: 20Gi

    # Persistent storage
    requests.storage: 200Gi
    persistentvolumeclaims: "10"

    # Object counts
    pods: "40"
    services: "20"
    services.loadbalancers: "2"
    services.nodeports: "0"
    configmaps: "50"
    secrets: "50"
    replicationcontrollers: "0"

    # Per-StorageClass quotas
    ssd.storageclass.storage.k8s.io/requests.storage: 150Gi
    standard.storageclass.storage.k8s.io/requests.storage: 50Gi

  scopes:
    - NotTerminating
