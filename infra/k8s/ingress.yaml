apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-hive-ingress
  namespace: nexus-hive
  labels:
    app.kubernetes.io/name: nexus-hive
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: nexus-hive.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nexus-hive-service
                port:
                  name: http
